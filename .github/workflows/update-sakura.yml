name: 🌸 Update Sakura Bloom Status

on:
  schedule:
    # 18:00 JST (09:00 UTC) daily — catches JMA's last daily update at 17:30 JST
    - cron: '0 9 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    # Season guard is handled inside src/index.ts (isInSeason checks JST month).
    # The workflow always runs, but the script exits immediately off-season.
    # This avoids GitHub Actions expression quirks with date formatting.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sakura tracker
        run: npx tsx src/index.ts
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TZ: Asia/Tokyo
